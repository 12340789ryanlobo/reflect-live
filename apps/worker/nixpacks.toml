# Railway (Nixpacks) build config for the reflect-live worker.
#
# Railway's default Node.js detection doesn't know to use bun for monorepo
# installs. This file tells Nixpacks to install bun + node, run `bun install`
# from the repo root (so all workspace packages resolve), compile the worker's
# TypeScript, and start the compiled output.
#
# Root Directory in Railway service settings should be `apps/worker`, so
# `cd ../..` lands at the repo root where bun.lock lives.

providers = ['node']

[phases.setup]
nixPkgs = ['nodejs_22', 'bun']

[phases.install]
cmds = ['cd ../.. && bun install --frozen-lockfile']

[phases.build]
cmds = ['cd ../.. && bun run --cwd apps/worker build']

[start]
cmd = 'node dist/index.js'
